<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RILCO HR Driving System</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/sidebar.css">

    <link rel="stylesheet" href="css/header.css">

    <link rel="stylesheet" href="css/app.css">

</head>

<body>

<div class="dashboard">

    <!-- =========================
            SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <div class="logo">

            <img src="asset/rilco-logo.png"
                alt="RILCO Logo">

            <h2>RILCO</h2>

            <span>HR Driving System</span>

        </div>

        <ul class="menu">

            <li class="active" data-page="dashboard">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li data-page="employees">
                <i class="fa-solid fa-users"></i>
                Employees
            </li>

            <li data-page="projects">
                <i class="fa-solid fa-diagram-project"></i>
                Projects
            </li>

            <li data-page="procedures">
                <i class="fa-solid fa-list-check"></i>
                Procedures
            </li>

            <li data-page="assignments">
                <i class="fa-solid fa-user-check"></i>
                Assignments
            </li>

            <li data-page="attendance">
                <i class="fa-solid fa-clock"></i>
                Attendance
            </li>

            <li data-page="drivers">
                <i class="fa-solid fa-truck"></i>
                Drivers
            </li>

            <li data-page="dtr">
                <i class="fa-solid fa-calendar-days"></i>
                DTR
            </li>

            <li data-page="payroll">
                <i class="fa-solid fa-money-bill-wave"></i>
                Payroll
            </li>

            <li data-page="leave">
                <i class="fa-solid fa-calendar-xmark"></i>
                Leave
            </li>

            <li data-page="reports">
                <i class="fa-solid fa-chart-column"></i>
                Reports
            </li>

        </ul>

        <button class="logout">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </aside>

    <!-- =========================
            MAIN
    ========================== -->

    <div class="main">
            <!-- =========================
            HEADER
    ========================== -->

    <header class="header">

        <div class="header-left">

            <button id="menuToggle" class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div>

                <h2 id="pageTitle">Dashboard</h2>

                <span>Welcome back, Administrator</span>

            </div>

        </div>

        <div class="header-right">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="globalSearch"
                    placeholder="Search...">

            </div>

            <button class="icon-btn">

                <i class="fa-solid fa-bell"></i>

            </button>

            <div class="profile">

                <img
                    src="asset/avatar.png"
                    alt="Administrator">

                <div>

                    <h4>Administrator</h4>

                    <span>HR Manager</span>

                </div>

            </div>

        </div>

    </header>

    <!-- =========================
            CONTENT
    ========================== -->

    <main class="content">

        <!-- Dynamic page will load here -->

        <div id="app">

            <div class="loading">

                <i class="fa-solid fa-spinner fa-spin"></i>

                <p>Loading Dashboard...</p>

            </div>

        </div>

    </main>

</div>

</div>

<!-- =========================
        JAVASCRIPT
========================== -->

<script src="js/app.js"></script>

</body>

</html>
