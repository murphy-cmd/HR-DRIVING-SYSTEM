<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">
            HR Driving System
        </a>

        <div class="navbar-nav">

            <a class="nav-link active" href="index.html">
                Dashboard
            </a>

            <a class="nav-link" href="employees.html">
                Employees
            </a>

            <a class="nav-link" href="attendance.html">
                Attendance
            </a>

            <a class="nav-link" href="drivers.html">
                Drivers
            </a>

            <a class="nav-link" href="history.html">
                History
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <!-- EMPLOYEE OVERVIEW -->

    <h4 class="mb-3">Employee Overview</h4>

    <div class="row mb-4">

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total Employees</h5>
                    <h2 id="totalEmployees">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Working</h5>
                    <h2 id="workingEmployees">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>On Break</h5>
                    <h2 id="breakEmployees">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center border-success">
                <div class="card-body">
                    <h5>Completed Today</h5>
                    <h2 id="completedEmployees">0</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- DRIVER OVERVIEW -->

    <h4 class="mb-3">Driver Overview</h4>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total Drivers</h5>
                    <h2 id="totalDrivers">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Available Drivers</h5>
                    <h2 id="availableDrivers">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Driving Now</h5>
                    <h2 id="drivingEmployees">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center border-primary">
                <div class="card-body">
                    <h5>Completed Trips</h5>
                    <h2 id="completedTrips">0</h2>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
