<div class="page">

    <div class="page-header">

        <div>

            <h1>Employee Management</h1>

            <p>Manage employee records.</p>

        </div>

        <button class="primary-btn">

            <i class="fa-solid fa-plus"></i>

            Add Employee

        </button>

    </div>

    <div class="card">

        <h3>Employee Table</h3>

        <br>

        <table class="table">

            <thead>

                <tr>

                    <th>Employee ID</th>

                    <th>Name</th>

                    <th>Department</th>

                    <th>Position</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="employeeTable">

            </tbody>

        </table>

    </div>

</div>
<!-- ==========================================
     ADD EMPLOYEE MODAL
========================================== -->

<div id="employeeModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Add Employee</h2>

            <button id="closeEmployeeModal">&times;</button>

        </div>

        <div class="modal-body">

            <div class="form-grid">

                <input type="text" id="employeeId" placeholder="Employee ID">

                <input type="text" id="fullName" placeholder="Full Name">

                <input type="text" id="position" placeholder="Position">

                <input type="text" id="department" placeholder="Department">

                <select id="employeeType">

                    <option value="office">Office Employee</option>

                    <option value="driver">Driver</option>

                </select>

                <select id="status">

                    <option value="WORKING">WORKING</option>

                    <option value="BREAK">BREAK</option>

                    <option value="DRIVING">DRIVING</option>

                </select>

            </div>

        </div>

        <div class="modal-footer">

            <button id="cancelEmployee" class="secondary-btn">

                Cancel

            </button>

            <button id="saveEmployee" class="primary-btn">

                Save Employee

            </button>

        </div>

    </div>

</div>
