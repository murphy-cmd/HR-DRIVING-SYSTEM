<div class="container mt-4">

    <h2 class="mb-4">Procedures</h2>

    <!-- Add Procedure -->

    <div class="card shadow-sm p-4 mb-4">

        <h5 class="mb-3">Add New Procedure</h5>

        <div class="row g-3">

            <div class="col-md-4">

                <label class="form-label">Procedure Name</label>

                <input
                type="text"
                id="procedureName"
                class="form-control"
                placeholder="Enter procedure">

            </div>

            <div class="col-md-3">

                <label class="form-label">Department</label>

                <select
                id="department"
                class="form-select">

                    <option value="">Select Department</option>

                    <option>Driver</option>
                    <option>Painting</option>
                    <option>Finishing</option>
                    <option>Carpentry</option>
                    <option>Safety</option>

                </select>

            </div>

            <div class="col-md-3">

               <label class="form-label">Order No</label>

<input
type="number"
id="orderNo"
class="form-control"
placeholder="Enter Order No">

</select>

            </div>

            <div class="col-md-2 d-grid">

                <label class="form-label">&nbsp;</label>

                <button
                class="btn btn-primary"
                id="saveProcedure">

                    Save

                </button>

            </div>

        </div>

    </div>



    <!-- Search -->

    <div class="row mb-3">

        <div class="col-md-4">

            <input

            type="text"

            id="search"

            class="form-control"

            placeholder="Search Procedure">

        </div>

    </div>



    <!-- Procedures Table -->

    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">

            <strong>Procedure List</strong>

        </div>

        <div class="table-responsive">

            <table class="table table-hover table-bordered mb-0">

                <thead class="table-light">

                    <tr>

                       <th width="35%">Procedure Name</th>
<th width="25%">Department</th>
<th width="20%">Status</th>
<th width="20%">Action</th>

                    </tr>

                </thead>

                <tbody id="procedureTable">

                    <tr>

                       <td>Primer Application</td>
<td>Painting</td>
<td>
    <span class="badge bg-success">
        Active
    </span>
</td>
                        <td>

                            <button class="btn btn-warning btn-sm">

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>Putty Application</td>

                        <td>Painting</td>

                        <td>1 Hour</td>

                        <td>

                            <button class="btn btn-warning btn-sm">

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>Sanding</td>

                        <td>Finishing</td>

                        <td>2 Hours</td>

                        <td>

                            <button class="btn btn-warning btn-sm">

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
