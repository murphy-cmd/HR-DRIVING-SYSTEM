<!DOCTYPE html>

<html lang="en">

<head>
<style>

body{

    font-family:'Segoe UI',sans-serif;
    background:#f4f7fb;

}

.navbar{

    background:linear-gradient(
        90deg,
        #111827,
        #0f172a
    );

    padding:15px 30px;

    box-shadow:0 5px 20px rgba(0,0,0,.25);

}

.logo{

    height:120px;

    width:auto;

    transition:.35s;

    filter:drop-shadow(
        0 0 12px rgba(108,77,255,.5)
    );

}

.logo:hover{

    transform:scale(1.05);

}

.navbar-nav{

    gap:10px;

}

.nav-link{

    color:white !important;

    font-size:20px;

    font-weight:600;

    padding:10px 16px !important;

    transition:.3s;

}

.nav-link:hover{

    color:#7C5CFF !important;

}

.nav-link.active{

    color:#7C5CFF !important;

    border-bottom:4px solid #7C5CFF;

}

.container{

    max-width:1500px;

}

.card{

    border:none;

    border-radius:18px;

    box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.btn-primary{

    background:#5B43D6;

    border:none;

}

.btn-primary:hover{

    background:#4B35BD;

}

</style>
