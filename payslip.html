<div class="container mt-4">

<h2>Payslip Generator</h2>

<div class="card p-4 mb-4">

<input
id="employeeSearch"
class="form-control mb-3"
placeholder="Employee Name">

<button
class="btn btn-primary"
onclick="generatePayslip()">

Generate Payslip

</button>

</div>

<div
id="payslipContainer"
class="card p-4">

<h3>Employee Payslip</h3>

<hr>

<p><strong>Employee:</strong> <span id="employeeName">-</span></p>

<p><strong>Work Hours:</strong> <span id="workHours">-</span></p>

<p><strong>OT Hours:</strong> <span id="otHours">-</span></p>

<p><strong>Daily Rate:</strong> ₱<span id="dailyRate">500</span></p>

<p><strong>Total Salary:</strong> ₱<span id="totalSalary">0.00</span></p>

<button
class="btn btn-success mt-3"
onclick="window.print()">

Print Payslip

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
