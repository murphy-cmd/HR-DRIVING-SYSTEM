<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DTR Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@media print {

    nav,
    button,
    input {
        display: none !important;
    }

    body {
        margin: 20px;
    }

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="index.html">
HR Driving System
</a>

<div class="navbar-nav">

<a class="nav-link" href="index.html">Dashboard</a>
<a class="nav-link" href="employees.html">Employees</a>
<a class="nav-link" href="attendance.html">Attendance</a>
<a class="nav-link" href="drivers.html">Drivers</a>
<a class="nav-link" href="history.html">History</a>
<a class="nav-link active" href="dtr.html">DTR</a>
<a class="nav-link" href="payroll.html">Payroll</a>

</div>

</div>

</nav>

<div class="container mt-4">

<h2>DTR Report</h2>

<div class="card p-4 mb-4">

<div class="row">

<div class="col-md-4">
<input
id="employeeSearch"
class="form-control"
placeholder="Employee Name">
</div>

<div class="col-md-3">
<input
type="date"
id="fromDate"
class="form-control">
</div>

<div class="col-md-3">
<input
type="date"
id="toDate"
class="form-control">
</div>

<div class="col-md-2">
<button
class="btn btn-primary w-100"
onclick="generateDTR()">
Generate
</button>
</div>

</div>

<div class="mt-3 d-flex gap-2">

<button
class="btn btn-success"
onclick="exportExcel()">
Export Excel
</button>

<button
class="btn btn-danger"
onclick="exportPDF()">
Export PDF
</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Employee</th>
<th>Date</th>
<th>AM IN</th>
<th>BREAK</th>
<th>PM IN</th>
<th>TIME OUT</th>
<th>Work Hours</th>
<th>OT Hours</th>
<th>Status</th>

</tr>

</thead>

<tbody id="dtrTable">

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="js/dtr.js"></script>

</body>

</html>
