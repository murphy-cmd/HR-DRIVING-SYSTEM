<!-- CONTENT -->

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2 class="fw-bold">

<i class="fa-solid fa-diagram-project"></i>

Project Management

</h2>

<p class="text-muted">

Manage all construction projects.

</p>

</div>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#projectModal">

<i class="fa-solid fa-plus"></i>

New Project

</button>

</div>

<!-- SEARCH -->

<div class="card mb-4">

<div class="card-body">

<input

type="text"

class="form-control"

id="searchProject"

placeholder="Search Project...">

</div>

</div>

<!-- ADD PROJECT -->

<div
class="modal fade"
id="projectModal"
tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Add New Project

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Project Name

</label>

<input

type="text"

class="form-control"

id="projectName">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Client

</label>

<input

type="text"

class="form-control"

id="client">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Category

</label>

<select
class="form-select"
id="category">

<option value="">

Select Category

</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Location

</label>

<input

type="text"

class="form-control"

id="location">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Start Date

</label>

<input

type="date"

class="form-control"

id="startDate">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Expected Finish

</label>

<input

type="date"

class="form-control"

id="finishDate">

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Status

</label>

<select

class="form-select"

id="status">

<option>

Active

</option>

<option>

On Hold

</option>

<option>

Completed

</option>

</select>

</div>

</div>

</div>

<div class="modal-footer">

<button

class="btn btn-secondary"

data-bs-dismiss="modal">

Cancel

</button>

<button

class="btn btn-primary"

id="saveProject">

Save Project

</button>

</div>

</div>

</div>

</div>
<!-- ACTIVE PROJECTS -->

<div class="row mt-4" id="projectsContainer">

<!-- Project Cards Here -->

</div>

<!-- PROJECT CARD TEMPLATE -->

<template id="projectCardTemplate">

<div class="col-lg-4 col-md-6 mb-4">

<div class="card project-card h-100">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-3">

<h5 class="project-title fw-bold">

Kitchen Cabinet

</h5>

<span class="badge bg-success">

Active

</span>

</div>

<div class="mb-3">

<p class="mb-1">

<b>Client:</b>

<span class="project-client">

ABC Corporation

</span>

</p>

<p class="mb-1">

<b>Category:</b>

<span class="project-category">

DUCCO PAINT

</span>

</p>

<p class="mb-1">

<b>Location:</b>

<span class="project-location">

Quezon City

</span>

</p>

</div>

<hr>

<div class="mb-2">

<div class="d-flex justify-content-between">

<span>

Employees Assigned

</span>

<span class="employee-count">

0

</span>

</div>

</div>

<div class="progress mb-3" style="height:10px;">

<div

class="progress-bar bg-primary project-progress"

style="width:0%;">

</div>

</div>

<div class="small text-muted mb-3">

Current Procedure

<br>

<b class="current-procedure">

Waiting Assignment

</b>

</div>

<div class="small text-muted mb-3">

Estimated Finish

<br>

<b class="estimated-finish">

--

</b>

</div>

<div class="d-grid gap-2">

<button

class="btn btn-outline-primary edit-project">

<i class="fa-solid fa-pen"></i>

Edit

</button>

<button

class="btn btn-outline-danger delete-project">

<i class="fa-solid fa-trash"></i>

Delete

</button>

</div>

</div>

</div>

</div>

</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/projects.js"></script>

</body>
</html>
